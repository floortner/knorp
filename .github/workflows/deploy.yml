# Beta deploy to AWS (ROADMAP §E). Auth is GitHub OIDC → a scoped IAM role — no static AWS keys.
# Manual only: this runs solely from the Actions "Run workflow" button (workflow_dispatch). Merging to
# main NEVER deploys — you choose when a new version goes to AWS.
#
# Requires these repo *variables* (Settings → Secrets and variables → Actions → Variables), from the
# `terraform output`s in infra/:
#   AWS_DEPLOY_ROLE_ARN  ARTIFACTS_BUCKET  INSTANCE_ID
#   APP_BUCKET  REVIEWER_BUCKET  APP_CF_ID  REVIEWER_CF_ID
#   API_BASE   (e.g. https://api.knorp.org/api/v1)
# Optional: SSM_PREFIX (defaults to /blsb/beta).
name: Deploy (beta)

on:
  workflow_dispatch: # manual button only — no push/tag triggers, so nothing auto-deploys

permissions:
  id-token: write # mint the OIDC token
  contents: read

concurrency:
  group: deploy-beta
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1

jobs:
  api:
    name: Backend → EC2 (build on box via SSM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package backend + deploy scripts
        run: |
          SHA="${GITHUB_SHA::12}"
          echo "SHA=$SHA" >> "$GITHUB_ENV"
          tar czf "release.tar.gz" besserlesenschreiben/backend deploy
          aws s3 cp "release.tar.gz" "s3://${{ vars.ARTIFACTS_BUCKET }}/releases/$SHA.tar.gz"

      - name: Run on-box release via SSM
        run: |
          SSM_PREFIX="${{ vars.SSM_PREFIX || '/blsb/beta' }}"
          # Bootstrap: download + extract the tarball, then exec deploy/release.sh on the box.
          cat > bootstrap.sh <<EOF
          set -euo pipefail
          REL="$SHA"
          rm -rf "/opt/blsb/releases/\$REL" && mkdir -p "/opt/blsb/releases/\$REL"
          aws s3 cp "s3://${{ vars.ARTIFACTS_BUCKET }}/releases/\$REL.tar.gz" "/tmp/\$REL.tar.gz" --region "$AWS_REGION"
          tar xzf "/tmp/\$REL.tar.gz" -C "/opt/blsb/releases/\$REL"
          cd "/opt/blsb/releases/\$REL"
          SSM_PREFIX="$SSM_PREFIX" AWS_REGION="$AWS_REGION" RELEASE="\$REL" bash deploy/release.sh
          EOF
          jq -Rs '{ commands: [ . ] }' < bootstrap.sh > params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy $SHA" \
            --timeout-seconds 900 \
            --parameters file://params.json \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"

          # Poll until the command reaches a terminal state. (The built-in `aws ssm wait
          # command-executed` waiter gives up after ~100s — far less than the on-box build takes.)
          STATUS=InProgress
          for i in $(seq 1 100); do   # 100 × 15s = up to 25 min
            sleep 15
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.INSTANCE_ID }}" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
              *) echo "  …$STATUS (${i}/100)" ;;
            esac
          done
          echo "----- release stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.INSTANCE_ID }}" --query StandardOutputContent --output text
          echo "----- release stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.INSTANCE_ID }}" --query StandardErrorContent --output text
          echo "status: $STATUS"
          [ "$STATUS" = "Success" ]

  web:
    name: ${{ matrix.name }} → S3 + CloudFront
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: family
            dir: besserlesenschreiben/frontend
            bucket_var: APP_BUCKET
            cf_var: APP_CF_ID
            pwa: "true"
          - name: reviewer
            dir: besserlesenschreiben/reviewer
            bucket_var: REVIEWER_BUCKET
            cf_var: REVIEWER_CF_ID
            pwa: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build
        working-directory: ${{ matrix.dir }}
        env:
          VITE_API_BASE: ${{ vars.API_BASE }}
          VITE_PWA: ${{ matrix.pwa }}
        run: |
          npm ci
          npm run build

      - name: Publish
        run: |
          aws s3 sync "${{ matrix.dir }}/dist" "s3://${{ vars[matrix.bucket_var] }}" --delete
          aws cloudfront create-invalidation --distribution-id "${{ vars[matrix.cf_var] }}" --paths "/*"
