name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint · typecheck · test · build · contract)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: besserlesenschreiben/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: besserlesenschreiben/backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      # Contract gate: the committed OpenAPI must match the code.
      - run: npm run openapi:export
      - name: openapi.json is up to date
        run: git diff --exit-code openapi.json

  frontend:
    name: frontend (lint · typecheck · test · build · contract)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: besserlesenschreiben/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: besserlesenschreiben/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # Contract gate: the committed generated types must match the committed OpenAPI.
      - run: npm run gen:api
      - name: api.gen.ts is up to date
        run: git diff --exit-code src/lib/api.gen.ts

  reviewer:
    name: reviewer (lint · typecheck · test · build · contract)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: besserlesenschreiben/reviewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: besserlesenschreiben/reviewer/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # Contract gate: the committed generated types must match the committed OpenAPI (/staff/* shipped).
      - run: npm run gen:api
      - name: api.gen.ts is up to date
        run: git diff --exit-code src/lib/api.gen.ts

  # End-to-end: real browser drives the family frontend against the backend + a Postgres service.
  # Deterministic — LLM stubbed (empty ANTHROPIC_API_KEY), local-disk storage, capture email. Separate
  # from the fast jobs above so their feedback stays quick.
  e2e:
    name: e2e (playwright · frontend + backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blsb_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: 'true'
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blsb_e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            besserlesenschreiben/backend/package-lock.json
            besserlesenschreiben/frontend/package-lock.json
      - name: Install backend deps
        working-directory: besserlesenschreiben/backend
        run: npm ci
      - name: Install frontend deps
        working-directory: besserlesenschreiben/frontend
        run: npm ci
      - name: Install e2e deps
        working-directory: e2e
        run: npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium webkit
      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
